<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AquaCascade — Service-Line Investigation Register</title>
<style>
 :root{--navy:#21295C;--deep:#065A82;--teal:#1C7293;--ink:#1E293B;
  --line:#D9E2EC;--bg:#F4F7FA;--mut:#5B6B7B}
 *{box-sizing:border-box} body{margin:0;font-family:Calibri,Arial,sans-serif;
  color:var(--ink);background:var(--bg)}
 header{background:var(--navy);color:#fff;padding:14px 26px}
 header b{font-family:Georgia,serif;font-size:20px}
 nav{background:var(--deep)} nav a{display:inline-block;color:#fff;
  text-decoration:none;padding:11px 18px;font-size:14px}
 nav a:hover{background:var(--teal)}
 main{max-width:1060px;margin:22px auto;padding:0 22px}
 h1{font-family:Georgia,serif;color:var(--navy);font-size:24px}
 h2{font-family:Georgia,serif;color:var(--deep);font-size:18px;margin-top:26px}
 table{border-collapse:collapse;width:100%;background:#fff;font-size:14px}
 th,td{border:1px solid var(--line);padding:8px 10px;text-align:left}
 th{background:var(--navy);color:#fff}
 tr:nth-child(even) td{background:#EAF0F6}
 .flash{background:#FFF4CE;border:1px solid #E0C200;padding:9px 14px;
  margin:8px 0;border-radius:4px;font-size:14px}
 .card{background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:18px 20px;margin:14px 0}
 label{display:block;margin:12px 0 4px;font-weight:bold;font-size:14px}
 input,select,textarea{width:100%;padding:8px;border:1px solid var(--line);
  border-radius:4px;font-size:14px;font-family:inherit}
 .btn{display:inline-block;background:var(--deep);color:#fff;border:0;
  padding:10px 20px;border-radius:5px;font-size:14px;cursor:pointer;
  text-decoration:none}
 .btn:hover{background:var(--teal)} .muted{color:var(--mut);font-size:13px}
 .pill{padding:2px 8px;border-radius:10px;font-size:12px;font-weight:bold}
 .hi{background:#FBE3E3;color:#B23B3B}.lo{background:#E3F0E8;color:#2E7D52}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:0 22px}
</style></head><body>
<header><b>AquaCascade</b> &nbsp;Service-Line Investigation Register
 <span class="muted" style="color:#9FB3C8">&nbsp;local · offline · v1</span></header>
<nav><a href="/">Home</a><a href="/import">Import lines</a>
 <a href="/worklist">Worklist</a>
 <a href="/rehab">Rehabilitation plan</a>
 <a href="/export/register.csv">Export register</a>
 <a href="/export/sdwis_rollup.csv">SDWIS rollup</a>
 <a href="/export/model_feedback.csv">Model feedback</a></nav>
<main>
{% with msgs = get_flashed_messages() %}{% for m in msgs %}
 <div class="flash">{{ m }}</div>{% endfor %}{% endwith %}
{% block body %}{% endblock %}
</main></body></html>
